<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register — Emotion Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
        }

        .bg-bubbles { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
        .bubble {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: floatUp linear infinite;
        }
        .bubble:nth-child(1) { width:60px;  height:60px;  left:10%; animation-duration:12s; animation-delay:0s; }
        .bubble:nth-child(2) { width:30px;  height:30px;  left:25%; animation-duration:9s;  animation-delay:2s; }
        .bubble:nth-child(3) { width:80px;  height:80px;  left:40%; animation-duration:14s; animation-delay:1s; }
        .bubble:nth-child(4) { width:20px;  height:20px;  left:60%; animation-duration:8s;  animation-delay:3s; }
        .bubble:nth-child(5) { width:50px;  height:50px;  left:75%; animation-duration:11s; animation-delay:0.5s; }
        .bubble:nth-child(6) { width:35px;  height:35px;  left:88%; animation-duration:10s; animation-delay:4s; }
        @keyframes floatUp {
            0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
        }

        .card {
            position: relative; z-index: 1;
            background: white; border-radius: 24px;
            padding: 40px 40px 34px; width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bot-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 34px; margin: 0 auto 20px;
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        h1 { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 28px; }

        .steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 28px; }
        .step  { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .step-circle {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            border: 2px solid #e0e0e0; color: #bbb; background: white; transition: all 0.3s;
        }
        .step-circle.active { border-color: #667eea; color: #667eea; }
        .step-circle.done   { border-color: #27ae60; background: #27ae60; color: white; }
        .step-label { font-size: 11px; color: #bbb; transition: color 0.3s; }
        .step-label.active { color: #667eea; }
        .step-label.done   { color: #27ae60; }
        .step-line { width: 60px; height: 2px; background: #e0e0e0; margin: 0 8px; margin-bottom: 16px; transition: background 0.3s; }
        .step-line.done { background: #27ae60; }

        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 7px; letter-spacing: 0.3px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 17px; color: #bbb; pointer-events: none; }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%; padding: 13px 42px 13px 42px;
            border: 2px solid #e8e8e8; border-radius: 12px;
            font-size: 15px; color: #333; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa;
        }
        input:focus { border-color: #667eea; background: white; box-shadow: 0 0 0 4px rgba(102,126,234,0.12); }
        input.valid   { border-color: #27ae60; }
        input.invalid { border-color: #e74c3c; }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none !important; }
        input[type="password"]::-webkit-contacts-auto-fill-button,
        input[type="password"]::-webkit-credentials-auto-fill-button { display: none !important; }

        .strength-bar { height: 6px; border-radius: 4px; background: #eee; margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s, background 0.3s; }
        .strength-text { font-size: 12px; color: #aaa; margin-top: 4px; }

        /* Requirement checklist */
        .pw-requirements {
            margin-top: 10px;
            background: #f8f8ff;
            border: 1px solid #e8e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 10px;
        }
        .req-item {
            font-size: 12px;
            color: #bbb;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .req-item.met { color: #27ae60; }
        .req-item .req-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #ddd; flex-shrink: 0; transition: background 0.2s;
        }
        .req-item.met .req-dot { background: #27ae60; }

        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #bbb; cursor: pointer; font-size: 17px; padding: 0;
        }
        .password-toggle:hover { color: #667eea; }

        .field-hint { font-size: 12px; color: #aaa; margin-top: 5px; padding-left: 2px; }
        .field-hint.ok  { color: #27ae60; }
        .field-hint.err { color: #e74c3c; }

        .btn-row { display: flex; gap: 10px; margin-top: 6px; }
        .btn-primary, .btn-secondary {
            flex: 1; padding: 13px; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover    { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e4e4e4; }

        .btn-full {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-full:hover    { opacity: 0.9; transform: translateY(-1px); }
        .btn-full:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .msg-box { display: none; padding: 11px 14px; border-radius: 10px; font-size: 14px; margin-top: 14px; font-weight: 500; }
        .msg-box.error   { background: #fff0f0; color: #c0392b; border: 1px solid #fac7c7; }
        .msg-box.success { background: #f0fff4; color: #27ae60; border: 1px solid #b7f0c8; }

        .summary-card { background: #f8f8ff; border: 1px solid #e0e0ff; border-radius: 14px; padding: 18px 20px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #ebebff; font-size: 14px; }
        .summary-row:last-child { border-bottom: none; }
        .summary-row .key   { color: #888; }
        .summary-row .value { color: #333; font-weight: 600; }

        .divider { text-align: center; color: #ccc; font-size: 13px; margin: 22px 0 16px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 38%; height: 1px; background: #eee; }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .login-link { text-align: center; font-size: 14px; color: #888; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }

        .spinner    { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white;   border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
        .spinner-sm { display: inline-block; width: 11px; height: 11px; border: 2px solid #ccc;                 border-top-color: #667eea; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bg-bubbles">
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
</div>

<div class="card">
    <div class="bot-icon">🤖</div>
    <h1>Create Account</h1>
    <p class="subtitle">Join the Emotion Chatbot today</p>

    <div class="steps">
        <div class="step">
            <div class="step-circle active" id="sc1">1</div>
            <div class="step-label active" id="sl1">Account</div>
        </div>
        <div class="step-line" id="line1"></div>
        <div class="step">
            <div class="step-circle" id="sc2">2</div>
            <div class="step-label" id="sl2">Security</div>
        </div>
        <div class="step-line" id="line2"></div>
        <div class="step">
            <div class="step-circle" id="sc3">3</div>
            <div class="step-label" id="sl3">Confirm</div>
        </div>
    </div>

    <!-- STEP 1 -->
    <div class="step-panel active" id="panel1">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="username" placeholder="e.g. robin"
                       oninput="validateUsername()" autocomplete="username" />
            </div>
            <div class="field-hint" id="username-hint">3–30 characters, letters/numbers/underscore</div>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
                <span class="input-icon">✉️</span>
                <input type="email" id="email" placeholder="you@example.com"
                       oninput="onEmailInput()"
                       onblur="onEmailBlur()"
                       autocomplete="email" />
            </div>
            <div class="field-hint" id="email-hint"></div>
        </div>
        <button class="btn-full" onclick="goStep2()" id="continueBtn1">Continue →</button>
    </div>

    <!-- STEP 2 -->
    <div class="step-panel" id="panel2">
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Create a strong password"
                       oninput="checkStrength()" autocomplete="new-password" />
                <button class="password-toggle" onclick="togglePw('password','eyeBtn1')" type="button" id="eyeBtn1">👁️</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText">Enter a password</div>
            <!-- Requirement checklist -->
            <div class="pw-requirements">
                <div class="req-item" id="req-len"><span class="req-dot"></span>8+ characters</div>
                <div class="req-item" id="req-upper"><span class="req-dot"></span>Uppercase letter</div>
                <div class="req-item" id="req-num"><span class="req-dot"></span>Number</div>
                <div class="req-item" id="req-special"><span class="req-dot"></span>Special character</div>
            </div>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔑</span>
                <input type="password" id="confirm" placeholder="Repeat your password"
                       oninput="checkConfirm()" autocomplete="new-password" />
                <button class="password-toggle" onclick="togglePw('confirm','eyeBtn2')" type="button" id="eyeBtn2">👁️</button>
            </div>
            <div class="field-hint" id="confirm-hint"></div>
        </div>
        <div class="btn-row">
            <button class="btn-secondary" onclick="goStep(1)">← Back</button>
            <button class="btn-primary"   onclick="goStep3()">Continue →</button>
        </div>
    </div>

    <!-- STEP 3 -->
    <div class="step-panel" id="panel3">
        <div class="summary-card">
            <div class="summary-row"><span class="key">Username</span><span class="value" id="s-username">—</span></div>
            <div class="summary-row"><span class="key">Email</span><span class="value" id="s-email">—</span></div>
            <div class="summary-row"><span class="key">Password</span><span class="value">••••••••</span></div>
        </div>
        <button class="btn-full" onclick="doRegister()" id="registerBtn">🎉 Create My Account</button>
        <div class="msg-box" id="msgBox"></div>
        <div class="btn-row" style="margin-top:10px;">
            <button class="btn-secondary" style="flex:1" onclick="goStep(2)">← Edit</button>
        </div>
    </div>

    <div class="divider">or</div>
    <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script>
    let currentStep      = 1;
    let emailTaken       = false;
    let emailChecking    = false;
    let emailDebounce    = null;
    let lastCheckedEmail = "";

    // ── Step navigation ────────────────────────────────────────────────
    function goStep(n) {
        document.getElementById(`panel${currentStep}`).classList.remove("active");
        currentStep = n;
        document.getElementById(`panel${n}`).classList.add("active");
        updateStepUI();
    }
    function updateStepUI() {
        for (let i = 1; i <= 3; i++) {
            const c = document.getElementById(`sc${i}`);
            const l = document.getElementById(`sl${i}`);
            c.className   = "step-circle" + (i < currentStep ? " done" : i === currentStep ? " active" : "");
            l.className   = "step-label"  + (i < currentStep ? " done" : i === currentStep ? " active" : "");
            c.textContent = i < currentStep ? "✓" : i;
        }
        document.getElementById("line1").className = "step-line" + (currentStep > 1 ? " done" : "");
        document.getElementById("line2").className = "step-line" + (currentStep > 2 ? " done" : "");
    }

    // ── Email ──────────────────────────────────────────────────────────
    function onEmailInput() {
        const val  = document.getElementById("email").value.trim();
        const inp  = document.getElementById("email");
        const hint = document.getElementById("email-hint");
        emailTaken = false; emailChecking = false;
        clearTimeout(emailDebounce); lastCheckedEmail = "";
        if (!val) { inp.className = ""; hint.className = "field-hint"; hint.textContent = ""; return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
            inp.className = "invalid"; hint.className = "field-hint err"; hint.textContent = "Please enter a valid email"; return;
        }
        inp.className = ""; hint.className = "field-hint";
        hint.innerHTML = `<span class="spinner-sm"></span> Checking availability…`;
        emailChecking = true;
        emailDebounce = setTimeout(() => runEmailCheck(val), 500);
    }
    function onEmailBlur() {
        const val = document.getElementById("email").value.trim();
        if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return;
        if (val === lastCheckedEmail) return;
        clearTimeout(emailDebounce);
        runEmailCheck(val);
    }
    async function runEmailCheck(email) {
        lastCheckedEmail = email; emailChecking = true;
        const inp  = document.getElementById("email");
        const hint = document.getElementById("email-hint");
        try {
            const res  = await fetch("/check-email", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
            const data = await res.json();
            if (document.getElementById("email").value.trim() !== email) return;
            emailChecking = false;
            if (data.taken) {
                emailTaken = true; inp.className = "invalid"; hint.className = "field-hint err"; hint.textContent = "⚠️ Email already taken. Please use another email.";
            } else {
                emailTaken = false; inp.className = "valid"; hint.className = "field-hint ok"; hint.textContent = "✓ Email is available!";
            }
        } catch (_) {
            if (document.getElementById("email").value.trim() !== email) return;
            emailChecking = false; emailTaken = false; inp.className = "valid"; hint.className = "field-hint ok"; hint.textContent = "✓ Valid email";
        }
    }

    // ── Step 1 → 2 ────────────────────────────────────────────────────
    async function goStep2() {
        if (!validateUsername()) return;
        const val = document.getElementById("email").value.trim();
        if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
            const hint = document.getElementById("email-hint");
            document.getElementById("email").className = "invalid";
            hint.className = "field-hint err";
            hint.textContent = !val ? "Email is required." : "Please enter a valid email.";
            return;
        }
        if (emailChecking) {
            const btn = document.getElementById("continueBtn1");
            btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Checking email…`;
            clearTimeout(emailDebounce);
            await runEmailCheck(val);
            btn.disabled = false; btn.innerHTML = "Continue →";
        }
        if (emailTaken) return;
        goStep(2);
    }

    // ── Step 2 → 3: MUST be Strong ────────────────────────────────────
    function goStep3() {
        const strengthOk = checkStrength(true);   // returns true only if score === 4 (Strong)
        const confirmOk  = checkConfirm(true);
        if (!strengthOk || !confirmOk) return;
        document.getElementById("s-username").textContent = document.getElementById("username").value.trim();
        document.getElementById("s-email").textContent    = document.getElementById("email").value.trim();
        goStep(3);
    }

    // ── Validators ────────────────────────────────────────────────────
    function validateUsername() {
        const val  = document.getElementById("username").value.trim();
        const inp  = document.getElementById("username");
        const hint = document.getElementById("username-hint");
        const ok   = /^[a-zA-Z0-9_]{3,30}$/.test(val);
        inp.className    = val ? (ok ? "valid" : "invalid") : "";
        hint.className   = "field-hint" + (val ? (ok ? " ok" : " err") : "");
        hint.textContent = val ? (ok ? "✓ Looks good!" : "3–30 chars, letters/numbers/underscore only") : "3–30 characters, letters/numbers/underscore";
        return ok;
    }

    function checkStrength(strict = false) {
        const pw    = document.getElementById("password").value;
        const fill  = document.getElementById("strengthFill");
        const text  = document.getElementById("strengthText");

        const hasLen     = pw.length >= 8;
        const hasUpper   = /[A-Z]/.test(pw);
        const hasNum     = /[0-9]/.test(pw);
        const hasSpecial = /[^A-Za-z0-9]/.test(pw);
        const score      = [hasLen, hasUpper, hasNum, hasSpecial].filter(Boolean).length;

        // Update requirement dots
        document.getElementById("req-len").classList.toggle("met", hasLen);
        document.getElementById("req-upper").classList.toggle("met", hasUpper);
        document.getElementById("req-num").classList.toggle("met", hasNum);
        document.getElementById("req-special").classList.toggle("met", hasSpecial);

        const levels = [
            { pct: "0%",   color: "#eee",    label: "Enter a password" },
            { pct: "25%",  color: "#e74c3c", label: "Weak — too easy to guess" },
            { pct: "50%",  color: "#f39c12", label: "Fair — needs improvement" },
            { pct: "75%",  color: "#f1c40f", label: "Good — almost there!" },
            { pct: "100%", color: "#27ae60", label: "Strong ✓ — great password!" },
        ];
        const lvl = levels[pw.length === 0 ? 0 : score];
        fill.style.width      = lvl.pct;
        fill.style.background = lvl.color;
        text.textContent      = lvl.label;
        text.style.color      = lvl.color === "#eee" ? "#aaa" : lvl.color;

        const isStrong = score === 4;

        if (strict) {
            if (pw.length === 0) {
                text.textContent = "⚠️ Password is required.";
                text.style.color = "#e74c3c";
                return false;
            }
            if (!isStrong) {
                text.textContent = "⚠️ Password must be Strong to continue. Meet all 4 requirements.";
                text.style.color = "#e74c3c";
                return false;
            }
        }

        return isStrong;
    }

    function checkConfirm(strict = false) {
        const pw   = document.getElementById("password").value;
        const conf = document.getElementById("confirm").value;
        const inp  = document.getElementById("confirm");
        const hint = document.getElementById("confirm-hint");
        if (!conf) {
            inp.className = ""; hint.textContent = ""; hint.className = "field-hint";
            if (strict) { hint.textContent = "Please confirm your password"; hint.className = "field-hint err"; return false; }
            return false;
        }
        const ok = pw === conf;
        inp.className    = ok ? "valid" : "invalid";
        hint.className   = "field-hint" + (ok ? " ok" : " err");
        hint.textContent = ok ? "✓ Passwords match!" : "Passwords do not match";
        return ok;
    }

    function togglePw(id, btnId) {
        const input = document.getElementById(id);
        const btn   = document.getElementById(btnId);
        const hide  = input.type === "password";
        input.type      = hide ? "text" : "password";
        btn.textContent = hide ? "🙈" : "👁️";
    }

    // ── Submit ────────────────────────────────────────────────────────
    function showMsg(text, type) {
        const box = document.getElementById("msgBox");
        box.textContent = text; box.className = `msg-box ${type}`; box.style.display = "block";
    }

    async function doRegister() {
        const username = document.getElementById("username").value.trim();
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("registerBtn");
        btn.disabled  = true;
        btn.innerHTML = `<span class="spinner"></span> Creating account...`;
        try {
            const res  = await fetch("/register", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            if (data.success) {
                showMsg("🎉 Account created! Redirecting to login...", "success");
                setTimeout(() => window.location.href = "/login", 1400);
            } else {
                const msg = data.message || "Registration failed.";
                showMsg(msg, "error");
                if (msg.toLowerCase().includes("email")) {
                    emailTaken = true; goStep(1);
                    document.getElementById("email").className = "invalid";
                    const hint = document.getElementById("email-hint");
                    hint.className = "field-hint err";
                    hint.textContent = "⚠️ Email already taken. Please use another email.";
                }
                btn.disabled  = false;
                btn.innerHTML = "🎉 Create My Account";
            }
        } catch (err) {
            showMsg("Connection error. Please try again.", "error");
            btn.disabled  = false;
            btn.innerHTML = "🎉 Create My Account";
        }
    }

    document.addEventListener("keypress", function(e) {
        if (e.key !== "Enter") return;
        if (currentStep === 1) goStep2();
        else if (currentStep === 2) goStep3();
        else if (currentStep === 3) doRegister();
    });
</script>
